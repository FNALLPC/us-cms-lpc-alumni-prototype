<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Card Examples — US‑CMS / LPC Alumni</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.13.0/tabler-icons.min.css">
  <script src="cards.js"></script>
  <style>
    :root{
      --bg: #ffffff;
      --surface: #ffffff;
      --text: #111111;
      --muted: #5a5f71;
      --primary: #0ea5e9;
      --primary-strong: #0284c7;
      --link: #0b57d0;
      --radius: 18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: radial-gradient(1200px 800px at 20% -10%, #19202a 0%, transparent 60%),
                  radial-gradient(1000px 800px at 120% 10%, #1a1c28 0%, transparent 55%),
                  var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    a{color:var(--link);text-decoration:none}
    a:hover{text-decoration:underline}

    header{
      position:sticky;top:0;z-index:20;background:rgba(255,255,255,0.7);backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(0,0,0,0.06);
    }
    .nav{
      display:flex;align-items:center;gap:18px;justify-content:space-between;
      max-width:1100px;margin:0 auto;padding:14px 28px;
    }
    .brand{display:flex;align-items:center;gap:12px}
    .logo{
      width:36px;height:36px;border-radius:10px;
      background:linear-gradient(135deg,var(--primary-strong),#a78bfa);
      display:grid;place-items:center;color:#0b111b;font-weight:800;letter-spacing:0.5px
    }
    .site-title{font-weight:700;font-size:18px}
    .back-link{font-size:14px;color:var(--muted)}

    main{max-width:1100px;margin:32px auto;padding:0 28px}

    h2{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin:0 0 10px}

    .row{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;align-items:start}

    /* Shared card styles (kept in sync with index.html) */
    .person{padding:14px;border-radius:14px;border:1px solid rgba(0,0,0,0.1);background:var(--surface);max-width:400px}
    .person h4{margin:0 0 6px}
    .meta{color:var(--muted);font-size:13px}
    .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
    .pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:12px;border:1px solid rgba(0,0,0,0.12);color:var(--muted);background:var(--surface)}
    a.pill{color:var(--link)}
    a.pill:hover{border-color:rgba(2,132,199,0.6);text-decoration:none}

    .label-badge{
      display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;
      margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em;
    }
    .label-full   {background:#dcfce7;color:#15803d}
    .label-hidden {background:#fef9c3;color:#854d0e}
    .label-no     {background:#fee2e2;color:#b91c1c}

    .redacted{display:inline-block;background:#e5e7eb;border-radius:4px;color:transparent;user-select:none}

    footer{color:var(--muted);font-size:13px;margin:50px 0 24px;text-align:center}
  </style>
</head>
<body>

<header>
  <div class="nav">
    <div class="brand">
      <div class="logo">AN</div>
      <div class="site-title">US‑CMS / LPC Alumni Network</div>
    </div>
    <a class="back-link" href="index.html"><i class="ti ti-arrow-left"></i> Back to site</a>
  </div>
</header>

<main>
  <div class="row">
    <div class="col">
      <h2>Full contact — <code>"full"</code></h2>
      <div id="card-full"></div>
    </div>
    <div class="col">
      <h2>Profile only — <code>"hidden"</code></h2>
      <div id="card-hidden"></div>
    </div>
    <div class="col">
      <h2>Non-public — <code>"no"</code></h2>
      <div id="card-no"></div>
    </div>
  </div>
</main>

<footer>Card examples for the US‑CMS / LPC Alumni Network.</footer>

<script>
  const samples = {
    full: {
      name: 'Alex Chen',
      email: 'alex.chen@example.com',
      contact_ok: 'full',
      org: 'NVIDIA',
      role: 'Research Scientist',
      sector: 'industry',
      location: 'San Francisco, CA',
      skills: ['ML', 'CUDA', 'HEP', 'Tracking'],
      linkedin: 'https://www.linkedin.com/in/example',
      orcid: '0000-0002-1234-5678',
      placement: { date: '2025-03-10', sector: 'industry' },
    },
    hidden: {
      name: 'Priya Patel',
      email: '',
      contact_ok: 'hidden',
      org: 'MIT',
      role: 'Postdoctoral Associate',
      sector: 'academia',
      location: 'Cambridge, MA',
      skills: ['Jet physics', 'Flavour tagging', 'ROOT'],
      linkedin: 'https://www.linkedin.com/in/example',
      orcid: null,
      placement: { date: '2024-11-08', sector: 'academia' },
    },
  };

  // Full and hidden — rendered by personCard()
  const fullCard = personCard(samples.full);
  fullCard.insertAdjacentHTML('afterbegin', '<span class="label-badge label-full">Full contact</span>');
  document.getElementById('card-full').appendChild(fullCard);

  const hiddenCard = personCard(samples.hidden);
  hiddenCard.insertAdjacentHTML('afterbegin', '<span class="label-badge label-hidden">Profile only</span>');
  document.getElementById('card-hidden').appendChild(hiddenCard);

  // Non-public — illustrative only (never rendered by personCard in practice)
  document.getElementById('card-no').innerHTML = `
    <div class="person" style="opacity:0.5;max-width:400px">
      <span class="label-badge label-no">Not listed</span>
      <h4><span class="redacted">████████████</span></h4>
      <div class="meta">💼 <span class="redacted">████████████████████████</span></div>
      <div class="meta">📍 <span class="redacted">███████████</span></div>
      <div class="tags">
        <span class="pill" style="color:transparent;background:#e5e7eb;border-color:transparent">████████</span>
        <span class="pill" style="color:transparent;background:#e5e7eb;border-color:transparent">████</span>
      </div>
      <div class="tags">
        <span class="pill"><i class="ti ti-eye-off"></i> Hidden from directory</span>
      </div>
    </div>`;
</script>

</body>
</html>
